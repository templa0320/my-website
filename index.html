<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reading Log</title>
    <style>
        /* CSS: 全体のデザイン */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #ddd;
            margin-bottom: 30px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 登録フォームのスタイル */
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* 幅を100%に収める */
        }

        button {
            background-color: #5d6275;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #4a4e5d;
        }

        /* 本の一覧（カード型）のスタイル */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 5px solid #5d6275;
        }

        .book-title {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .book-author {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .favorite-phrase {
            font-style: italic;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Reading Log</h1>
        <p>心に残ったフレーズをストックする</p>
    </header>

    <!-- ステップ1: 登録フォーム -->
    <section class="form-section">
        <h3>新しい本を記録する</h3>
        <div class="form-group">
            <label>タイトル</label>
        </div>
        <div class="form-group">
            <label>著者</label
        </div>
        <button type="button">記録する</button>
    </section>

    <!-- ステップ1: 表示一覧（ダミーデータ） -->
    <section>
        <h3>これまでの記録</h3>
        <div class="book-grid">
            <!-- 1冊目 -->
            <div class="book-card">
                <p class="book-title">コンビニ人間</p>
                <p class="book-author">村田沙耶香</p>
                <p class="favorite-phrase">「皆がその奇妙なものを、排除しようとする。直そうとする。」</p>
            </div>
            <!-- 2冊目 -->
            <div class="book-card">
                <p class="book-title">人間失格</p>
                <p class="book-author">太宰治</p>
                <p class="favorite-phrase">「恥の多い生涯を送って来ました。」</p>
            </div>
        </div>
    </section>
</div>

</body>
</html>
